# Combined Linux server daemon configuration for the current production-style APT runtime.

bind = "0.0.0.0:51820"
public_endpoint = "203.0.113.10:51820"
d2_bind = "0.0.0.0:443"
d2_public_endpoint = "203.0.113.10:443"
d2_certificate = "file:/etc/adapt/d2-certificate.pem"
d2_private_key = "file:/etc/adapt/d2-private-key.pem"
mode = 100
endpoint_id = "adapt-prod"

# Secret material can be provided inline as 64 hex characters or via `file:/path/to/key`.
admission_key = "file:/etc/adapt/shared-admission.key"
server_static_private_key = "file:/etc/adapt/server-static-private.key"
server_static_public_key = "file:/etc/adapt/server-static-public.key"
cookie_key = "file:/etc/adapt/cookie.key"
ticket_key = "file:/etc/adapt/ticket.key"

interface_name = "aptsrv0"
tunnel_local_ipv4 = "10.77.0.1"
tunnel_netmask = "255.255.255.0"
# Optional IPv6 tunnel block. Only enable this if the Linux host has IPv6 enabled.
# tunnel_local_ipv6 = "fd77:77::1"
# tunnel_ipv6_prefix_len = 64
tunnel_mtu = 1380

# Linux server egress interface used for forwarding/NAT.
egress_interface = "eth0"
enable_ipv4_forwarding = true
nat_ipv4 = true
# enable_ipv6_forwarding = true
# nat_ipv6 = true

# Routes pushed to clients after the encrypted session is established.
push_routes = ["0.0.0.0/0"]
push_dns = ["1.1.1.1", "1.0.0.1"]

# Enable authenticated path revalidation plus the optional D2 listener.
allow_session_migration = true
keepalive_secs = 25
session_idle_timeout_secs = 180
udp_recv_buffer_bytes = 4194304
udp_send_buffer_bytes = 4194304

# One authorized client entry per stable client static public key.
[[peers]]
name = "laptop"
auth_profile = "per-user"
user_id = "laptop"
admission_key = "file:/etc/adapt/users/laptop.admission.key"
client_static_public_key = "file:/etc/adapt/clients/laptop.client-static-public.key"
tunnel_ipv4 = "10.77.0.2"
# tunnel_ipv6 = "fd77:77::2"
