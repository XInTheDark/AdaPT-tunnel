# Logical client configuration embedded inside a single-file `.aptbundle`.

server_addr = "203.0.113.10:51820"
d2_server_addr = "203.0.113.10:443"
d2_server_certificate = "file:/etc/adapt/d2-certificate.pem"
mode = 100
preferred_carrier = "auto"
auth_profile = "per-user"
endpoint_id = "adapt-prod"

# Secret material can be provided inline as 64 hex characters or via `file:/path/to/key`.
admission_key = "file:/etc/adapt/user-admission.key"
server_static_public_key = "file:/etc/adapt/server-static-public.key"
client_static_private_key = "file:/etc/adapt/client-static-private.key"

client_identity = "laptop"
bind = "0.0.0.0:0"

# Leave this unset for portable bundles. Linux can use an auto-created tun name,
# and macOS will auto-allocate a `utun` interface.
# interface_name = "utun6"

# Normally leave this empty and let the server push routes.
routes = []
use_server_pushed_routes = true

# Prefer D2 when it is configured, then fall back to opaque D1 only as needed.
enable_d2_fallback = true
allow_session_migration = true
# 0 means "use the persona-selected sparse standby probe cadence".
standby_health_check_secs = 0

keepalive_secs = 25
session_idle_timeout_secs = 180
handshake_timeout_secs = 5
handshake_retries = 5
udp_recv_buffer_bytes = 4194304
udp_send_buffer_bytes = 4194304

# Normally leave this unset so the installed client uses the bundle-local state
# path automatically (for example `~/.adapt-tunnel/client.state.toml`).
# state_path = "/custom/path/client.state.toml"
