name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust 1.84.0
        run: |
          rustup toolchain install 1.84.0 --profile minimal
          rustup default 1.84.0

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

  musl-release-build:
    name: Build static Linux release bundle target
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust 1.84.0
        run: |
          rustup toolchain install 1.84.0 --profile minimal --target x86_64-unknown-linux-musl
          rustup default 1.84.0

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build static Linux release binaries
        run: cargo build --release --locked --target x86_64-unknown-linux-musl -p apt-edge -p apt-client -p apt-tunneld
