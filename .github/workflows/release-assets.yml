name: Release assets

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust 1.84.0
        run: |
          rustup toolchain install 1.84.0 --profile minimal --target ${{ matrix.target }}
          rustup default 1.84.0

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p apt-edge -p apt-client -p apt-tunneld

      - name: Package release bundle
        run: ./scripts/package-release.sh ${{ matrix.target }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Upload assets to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/* --repo "${{ github.repository }}" --clobber
